# Docker Compose configuration for development with hot reload
# Provides SQLite Backup service with source mounting for rapid development

version: '3.8'

services:
  sqlite-backup:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder  # Use builder stage for development
    image: sqlite-backup:dev
    container_name: sqlite-backup-dev
    restart: unless-stopped
    ports:
      - "5000:5000"      # Application port
      - "5001:5001"      # Debug port (if needed)
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://0.0.0.0:5000"
      DOTNET_USE_POLLING_FILE_WATCHER: "true"  # Required for file watching in containers
      AppSettings__DatabasePath: /data/app.db
      AppSettings__LocalStoragePath: /backups
      AppSettings__MaxConcurrentBackups: "3"
      AppSettings__BackupTimeoutSeconds: "3600"
      AppSettings__EnableVerificationByDefault: "true"
      AppSettings__RetentionDays: "30"
      AppSettings__MaxBackupCount: "10"
      Logging__LogLevel__Default: "Debug"
    volumes:
      - ./:/app:ro          # Mount source code (read-only for safety)
      - ./data:/data
      - ./backups:/backups
      - ./appsettings.json:/app/appsettings.json:ro
    command: dotnet watch run --project docker-sqlite-backup.csproj --no-launch-profile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backup-network

networks:
  backup-network:
    driver: bridge